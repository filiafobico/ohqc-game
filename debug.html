<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Debug - O Homem que Calculava</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #2c1810; color: white; }
        .debug { background-color: #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { color: #32CD32; }
        .error { color: #FF4500; }
        .warning { color: #FFD700; }
    </style>
</head>
<body>
    <h1>Debug - O Homem que Calculava</h1>
    <div id="debug-output"></div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <script>
        const debugOutput = document.getElementById('debug-output');

        function addDebugMessage(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'debug ' + type;
            div.innerHTML = message;
            debugOutput.appendChild(div);
            console.log(message);
        }

        // Test Phaser loading
        addDebugMessage('1. Testing Phaser.js...', 'info');
        if (typeof Phaser !== 'undefined') {
            addDebugMessage('✓ Phaser.js carregado: ' + Phaser.VERSION, 'success');
        } else {
            addDebugMessage('✗ Phaser.js NÃO foi carregado', 'error');
        }
    </script>

    <!-- GameConfig -->
    <script>
        addDebugMessage('2. Testing GameConfig...', 'info');
        const GameConfig = {
            WIDTH: 1024,
            HEIGHT: 768,
            COLORS: {
                PRIMARY: 0x8b4513,
                SECONDARY: 0xd4af37,
                BACKGROUND: 0x2c1810,
                TEXT: 0xffffff,
                ACCENT: 0xff6b35
            },
            ANIMATIONS: {
                FADE_DURATION: 500,
                TEXT_SPEED: 50,
                BUTTON_HOVER_SCALE: 1.1
            }
        };
        addDebugMessage('✓ GameConfig definido', 'success');
    </script>

    <!-- Test each script -->
    <script>
        addDebugMessage('3. Testing script loading...', 'info');

        const scripts = [
            'systems/DialogueSystem.js',
            'systems/QuestionSystem.js',
            'systems/AnimationSystem.js',
            'src/scenes/IntroScene.js',
            'src/scenes/StoryScene.js',
            'src/scenes/QuestionScene.js',
            'src/scenes/ResultScene.js',
            'src/game.js'
        ];

        let loadedScripts = 0;

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    addDebugMessage('✓ Carregado: ' + src, 'success');
                    loadedScripts++;
                    resolve();
                };
                script.onerror = () => {
                    addDebugMessage('✗ ERRO ao carregar: ' + src, 'error');
                    reject();
                };
                document.head.appendChild(script);
            });
        }

        async function loadAllScripts() {
            for (let script of scripts) {
                try {
                    await loadScript(script);
                } catch (error) {
                    addDebugMessage('Erro no script: ' + script, 'error');
                }
            }

            // Test classes after all scripts loaded
            setTimeout(testClasses, 500);
        }

        function testClasses() {
            addDebugMessage('4. Testing classes...', 'info');

            const classes = [
                { name: 'DialogueSystem', test: () => typeof DialogueSystem !== 'undefined' },
                { name: 'QuestionSystem', test: () => typeof QuestionSystem !== 'undefined' },
                { name: 'AnimationSystem', test: () => typeof AnimationSystem !== 'undefined' },
                { name: 'IntroScene', test: () => typeof IntroScene !== 'undefined' },
                { name: 'StoryScene', test: () => typeof StoryScene !== 'undefined' },
                { name: 'QuestionScene', test: () => typeof QuestionScene !== 'undefined' },
                { name: 'ResultScene', test: () => typeof ResultScene !== 'undefined' },
                { name: 'CalculavaGame', test: () => typeof CalculavaGame !== 'undefined' }
            ];

            for (let classInfo of classes) {
                try {
                    if (classInfo.test()) {
                        addDebugMessage('✓ Classe disponível: ' + classInfo.name, 'success');
                    } else {
                        addDebugMessage('✗ Classe NÃO disponível: ' + classInfo.name, 'error');
                    }
                } catch (error) {
                    addDebugMessage('✗ Erro ao testar classe ' + classInfo.name + ': ' + error.message, 'error');
                }
            }

            // Test game creation
            addDebugMessage('5. Testing game creation...', 'info');
            if (typeof CalculavaGame !== 'undefined') {
                try {
                    addDebugMessage('Tentando criar CalculavaGame...', 'warning');
                    const testGame = new CalculavaGame();
                    addDebugMessage('✓ CalculavaGame criado com sucesso!', 'success');
                    testGame.phaserGame.destroy();
                } catch (error) {
                    addDebugMessage('✗ Erro ao criar CalculavaGame: ' + error.message, 'error');
                }
            } else {
                addDebugMessage('✗ CalculavaGame não está definido', 'error');
            }
        }

        loadAllScripts();
    </script>
</body>
</html>
