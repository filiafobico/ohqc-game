<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>O Homem que Calculava - Aventuras de Beremiz</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2c1810;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c1810;
        }

        canvas {
            display: block;
        }

        .loading {
            color: #d4af37;
            text-align: center;
            font-size: 18px;
        }

        /* Portrait mode overlay — shown only on narrow screens */
        #portrait-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #2c1810;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            color: #d4af37;
            font-family: Arial, serif;
            text-align: center;
            padding: 24px;
        }

        #portrait-overlay .rotate-icon {
            font-size: 64px;
            animation: spin 2s linear infinite;
        }

        #portrait-overlay h2 {
            margin: 0;
            font-size: 22px;
            color: #d4af37;
        }

        #portrait-overlay p {
            margin: 0;
            font-size: 15px;
            color: #ffffff;
            max-width: 280px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            25%  { transform: rotate(90deg); }
            75%  { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        /* Show overlay only on mobile portrait */
        @media (max-width: 600px) and (orientation: portrait) {
            #portrait-overlay { display: flex; }
        }
    </style>
</head>
<body>
    <!-- Portrait mode warning -->
    <div id="portrait-overlay">
        <div class="rotate-icon">📱</div>
        <h2>Gire o dispositivo</h2>
        <p>O Homem que Calculava é melhor aproveitado na horizontal.</p>
    </div>

    <div id="game-container">
        <div id="loading" class="loading">Carregando O Homem que Calculava...</div>
    </div>

    <!-- Phaser.js CDN - using stable version -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Global game configuration - must be loaded first -->
    <script>
        const GameConfig = {
            WIDTH: 1024,
            HEIGHT: 576,  // Changed from 768 to 576 for 16:9 aspect ratio
            COLORS: {
                PRIMARY: 0x8b4513,      // Saddle brown
                SECONDARY: 0xd4af37,    // Gold
                BACKGROUND: 0x2c1810,   // Dark brown
                TEXT: 0xffffff,         // White
                ACCENT: 0xff6b35        // Orange
            },
            FONTS: {
                TITLE: { fontSize: '32px', fill: '#d4af37', fontFamily: 'Arial, serif' },
                DIALOGUE: { fontSize: '18px', fill: '#ffffff', fontFamily: 'Arial, sans-serif' },
                BUTTON: { fontSize: '16px', fill: '#ffffff', fontFamily: 'Arial, sans-serif' },
                QUESTION: { fontSize: '20px', fill: '#d4af37', fontFamily: 'Arial, sans-serif' }
            },
            ANIMATIONS: {
                FADE_DURATION: 500,
                TEXT_SPEED: 50,
                BUTTON_HOVER_SCALE: 1.1
            }
        };
    </script>

    <!-- Game Systems -->
    <script src="systems/DialogueSystem.js"></script>
    <script src="systems/QuestionSystem.js"></script>
    <script src="systems/AnimationSystem.js"></script>

    <!-- Game Scenes -->
    <script src="src/scenes/IntroScene.js"></script>
    <script src="src/scenes/CreditsScene.js"></script>
    <script src="src/scenes/LevelSelectScene.js"></script>
    <script src="src/scenes/StoryScene.js"></script>
    <script src="src/scenes/QuestionScene.js"></script>
    <script src="src/scenes/ResultScene.js"></script>

    <!-- Main Game Files -->
    <script src="src/game.js"></script>
    <script src="src/main.js"></script>

    <script>
        // Ensure the game container always fills the viewport, including on mobile
        function resizeContainer() {
            const container = document.getElementById('game-container');
            if (container) {
                container.style.width  = window.innerWidth  + 'px';
                container.style.height = window.innerHeight + 'px';
            }
        }
        resizeContainer();
        window.addEventListener('resize', resizeContainer);
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeContainer, 200);
        });
    </script>
</body>
</html>
