<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Simple - O Homem que Calculava</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c1810;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            border: 3px solid #8b4513;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(139, 69, 19, 0.5);
        }

        canvas {
            display: block;
        }

        .loading {
            color: #d4af37;
            text-align: center;
            font-size: 18px;
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading" class="loading">Carregando versão simplificada...</div>
    </div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Simple Game Config -->
    <script>
        const GameConfig = {
            WIDTH: 1024,
            HEIGHT: 768,
            COLORS: {
                PRIMARY: 0x8b4513,      // Saddle brown
                SECONDARY: 0xd4af37,    // Gold
                BACKGROUND: 0x2c1810,   // Dark brown
                TEXT: 0xffffff,         // White
                ACCENT: 0xff6b35        // Orange
            }
        };
    </script>

    <!-- Simple Scene -->
    <script src="src/scenes/IntroScene-Simple.js"></script>

    <!-- Simple Game Initialization -->
    <script>
        window.addEventListener('load', () => {
            console.log('Carregando teste simples...');

            setTimeout(() => {
                // Hide loading message
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.display = 'none';
                }

                console.log('Iniciando teste simples...');

                // Simple Phaser configuration
                const config = {
                    type: Phaser.AUTO,
                    width: GameConfig.WIDTH,
                    height: GameConfig.HEIGHT,
                    parent: 'game-container',
                    backgroundColor: GameConfig.COLORS.BACKGROUND,
                    scene: [IntroSceneSimple],
                    scale: {
                        mode: Phaser.Scale.FIT,
                        autoCenter: Phaser.Scale.CENTER_BOTH
                    }
                };

                try {
                    // Create simple game
                    const game = new Phaser.Game(config);
                    window.testGame = game;
                    console.log('✅ Jogo simples iniciado!');
                } catch (error) {
                    console.error('❌ Erro no jogo simples:', error);
                    document.getElementById('game-container').innerHTML = '<div class="loading">Erro: ' + error.message + '</div>';
                }
            }, 200);
        });
    </script>
</body>
</html>
