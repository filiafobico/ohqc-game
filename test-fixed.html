<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Fixed - O Homem que Calculava</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c1810;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            border: 3px solid #8b4513;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(139, 69, 19, 0.5);
        }

        canvas {
            display: block;
        }

        .loading {
            color: #d4af37;
            text-align: center;
            font-size: 18px;
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading" class="loading">Carregando versão corrigida...</div>
    </div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Game Config -->
    <script>
        const GameConfig = {
            WIDTH: 1024,
            HEIGHT: 768,
            COLORS: {
                PRIMARY: 0x8b4513,      // Saddle brown
                SECONDARY: 0xd4af37,    // Gold
                BACKGROUND: 0x2c1810,   // Dark brown
                TEXT: 0xffffff,         // White
                ACCENT: 0xff6b35        // Orange
            },
            FONTS: {
                TITLE: { fontSize: '32px', fill: '#d4af37', fontFamily: 'Arial, serif' },
                DIALOGUE: { fontSize: '18px', fill: '#ffffff', fontFamily: 'Arial, sans-serif' },
                BUTTON: { fontSize: '16px', fill: '#ffffff', fontFamily: 'Arial, sans-serif' },
                QUESTION: { fontSize: '20px', fill: '#d4af37', fontFamily: 'Arial, sans-serif' }
            },
            ANIMATIONS: {
                FADE_DURATION: 500,
                TEXT_SPEED: 50,
                BUTTON_HOVER_SCALE: 1.1
            }
        };
    </script>

    <!-- Fixed Scene -->
    <script src="src/scenes/IntroScene-Fixed.js"></script>

    <!-- Game Initialization -->
    <script>
        window.addEventListener('load', () => {
            console.log('Carregando teste corrigido...');

            setTimeout(() => {
                // Hide loading message
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.display = 'none';
                }

                console.log('Iniciando teste corrigido...');

                // Game configuration
                const config = {
                    type: Phaser.AUTO,
                    width: GameConfig.WIDTH,
                    height: GameConfig.HEIGHT,
                    parent: 'game-container',
                    backgroundColor: GameConfig.COLORS.BACKGROUND,
                    scene: [IntroSceneFixed],
                    scale: {
                        mode: Phaser.Scale.FIT,
                        autoCenter: Phaser.Scale.CENTER_BOTH,
                        min: {
                            width: 800,
                            height: 600
                        },
                        max: {
                            width: 1200,
                            height: 900
                        }
                    },
                    physics: {
                        default: 'arcade',
                        arcade: {
                            gravity: { y: 0 },
                            debug: false
                        }
                    }
                };

                try {
                    // Create game
                    const game = new Phaser.Game(config);
                    window.testGameFixed = game;
                    console.log('✅ Jogo corrigido iniciado!');
                } catch (error) {
                    console.error('❌ Erro no jogo corrigido:', error);
                    document.getElementById('game-container').innerHTML = '<div class="loading">Erro: ' + error.message + '</div>';
                }
            }, 300);
        });
    </script>
</body>
</html>
